eyebrow: "About"
title: "Experienced wildlife control for difficult to reach problems."
intro: "What makes Bigfoot Wildlife Solutions different from most companies is expertise."
paragraphs:
  - "We are a fully licensed and insured nuisance wildlife animal removal and control service company dedicated to exceptional customer service and punctuality."
  - "We specialize in cabins, rentals, second homes, and similar buildings with difficult to reach areas, steep pitched rooftops, and mountainside structures."
values:
