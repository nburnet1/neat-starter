---
layout: default
---

<section class="border-b border-brand-pine/12 bg-brand-bone">
    <div class="container mx-auto px-4 py-14 sm:px-6 lg:py-20">
        <a href="/animals/" class="text-sm font-black uppercase tracking-[0.2em] text-brand-rust underline decoration-brand-brass decoration-2 underline-offset-4">Back to animal education</a>
        <div class="mt-8 grid gap-10 lg:grid-cols-[0.8fr_1.2fr]">
            <div>
                {% if image %}
                    <img src="{{ image }}" alt="{{ title }}" class="h-full min-h-[16rem] w-full border border-brand-pine/12 bg-white object-cover shadow-sm sm:min-h-[20rem]">
                {% else %}
                    <div class="flex min-h-[16rem] items-center justify-center border border-dashed border-brand-smoke/45 bg-white px-4 text-center text-sm leading-6 text-brand-smoke shadow-sm sm:min-h-[20rem] sm:px-6 sm:leading-7">Add a photo for {{ title }} in the content manager.</div>
                {% endif %}
            </div>

            <div>
                <p class="text-xs font-semibold uppercase tracking-[0.35em] text-brand-smoke">Animal Education</p>
                <h1 class="mt-3 text-left text-brand-pine">{{ title }}</h1>
                <article class="prose prose-stone mt-8 max-w-none prose-headings:text-brand-ink prose-p:text-brand-hide prose-li:text-brand-hide prose-strong:text-brand-ink prose-a:text-brand-rust">
                    {{ content | safe }}
                </article>
            </div>
        </div>
    </div>
</section>
