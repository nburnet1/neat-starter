---
layout: default
prism: true
---

<div class="container max-w-4xl px-6 py-16">
    <div class="mb-8 border-b border-stone-300 pb-6">
        <p class="mb-4 text-xs font-semibold uppercase tracking-[0.35em] text-stone-500">Field Report</p>
        <h1 class="font-bold text-5xl text-left text-stone-900">{{title}}</h1>
        <p class="mt-4 text-base leading-6 font-medium text-stone-600">
             <time> {{ date | readableDate }}
                by
                <a>{{ author }}</a>

            </time>
        </p>

    </div>
    <article class="prose prose-stone lg:prose-xl mx-auto my-4">
        {{ content | safe }}</article>

</div>
