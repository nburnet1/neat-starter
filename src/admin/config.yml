backend:
  # Use netlify identity as backend
  name: git-gateway
  branch: master
  ### enable below lines for github integration ###
  # name: github
  # repo: surjithctly/neat-starter
media_folder: "src/static/img"
public_folder: "/static/img"

# Please run "npx netlify-cms-proxy-server" for local backend
local_backend: true
# publish_mode: editorial_workflow
collections:
  - label: "Wildlife"
    name: "animals"
    folder: "src/animals/pages"
    create: true
    slug: "{{slug}}"
    editor:
      preview: false
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Body", name: "body", widget: "markdown" }
  - label: "Settings"
    name: "settings"
    editor:
      preview: false
    files:
      - label: "Navigation"
        name: "items"
        file: "src/_data/navigation.yaml"
        fields:
          - label: Nav Items
            name: items
            widget: list
            allow_add: false
            collapsed: false
            fields:
              - { label: Title, name: text, widget: string }
              - { label: URL, name: url, widget: string }
      - label: "Quick Links"
        name: "links"
        file: "src/_data/quicklinks.yaml"
        fields:
          - label: Nav Items
            name: links
            widget: list
            collapsed: false
            fields:
              - { label: Title, name: title, widget: string }
              - { label: URL, name: url, widget: string }
              - { label: Description, name: desc, widget: string }
      - label: "Meta Settings"
        name: "settings"
        file: "src/_data/settings.yaml"
        fields:
          - { label: Name, name: name, widget: string }
          - { label: Author, name: author, widget: string }
          - { label: URL, name: url, widget: string }
          - { label: Phone, name: phone, widget: string }
          - { label: Email, name: email, widget: string }
          - { label: Service Area, name: service_area, widget: string }
      - label: "Homepage"
        name: "home"
        file: "src/_data/home.yaml"
        fields:
          - { label: Eyebrow, name: eyebrow, widget: string }
          - { label: Title, name: title, widget: string }
          - { label: Description, name: description, widget: text }
          - { label: Primary CTA Label, name: primary_cta_label, widget: string }
          - { label: Secondary CTA Label, name: secondary_cta_label, widget: string }
          - label: Stats
            name: stats
            widget: list
            fields:
              - { label: Label, name: label, widget: string }
              - { label: Value, name: value, widget: string }
          - { label: Trust Heading, name: trust_heading, widget: string }
          - label: Trust Points
            name: trust_points
            widget: list
            field: { label: Point, name: point, widget: string }
          - { label: Wildlife Eyebrow, name: animals_eyebrow, widget: string }
          - { label: Wildlife Title, name: animals_title, widget: string }
          - { label: Wildlife Intro, name: animals_intro, widget: text }
          - label: Featured Animal One
            name: featured_animal_one
            widget: relation
            collection: animals
            search_fields: [title]
            value_field: title
            display_fields: [title]
          - label: Featured Animal Two
            name: featured_animal_two
            widget: relation
            collection: animals
            search_fields: [title]
            value_field: title
            display_fields: [title]
          - label: Featured Animal Three
            name: featured_animal_three
            widget: relation
            collection: animals
            search_fields: [title]
            value_field: title
            display_fields: [title]
          - { label: Wildlife CTA Label, name: animals_cta_label, widget: string }
      - label: "Services"
        name: "services"
        file: "src/_data/services.yaml"
        fields:
          - { label: Eyebrow, name: eyebrow, widget: string }
          - { label: Title, name: title, widget: string }
          - { label: Intro, name: intro, widget: text }
          - label: Service Items
            name: items
            widget: list
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Body, name: body, widget: text }
      - label: "Service Areas"
        name: "serviceAreas"
        file: "src/_data/serviceAreas.yaml"
        fields:
          - { label: Eyebrow, name: eyebrow, widget: string }
          - { label: Title, name: title, widget: string }
          - { label: Intro, name: intro, widget: text }
          - label: Areas
            name: areas
            widget: list
            fields:
              - { label: Zip Code, name: zip_code, widget: string }
              - { label: City, name: city, widget: string }
              - { label: State, name: state, widget: string }
              - { label: Latitude, name: latitude, widget: number, value_type: float }
              - { label: Longitude, name: longitude, widget: number, value_type: float }
              - { label: Radius Miles, name: radius_miles, widget: number, value_type: int }
              - { label: Summary, name: summary, widget: text }
      - label: "About"
        name: "about"
        file: "src/_data/about.yaml"
        fields:
          - { label: Eyebrow, name: eyebrow, widget: string }
          - { label: Title, name: title, widget: string }
          - { label: Intro, name: intro, widget: text }
          - label: Paragraphs
            name: paragraphs
            widget: list
            field: { label: Paragraph, name: paragraph, widget: text }
          - label: Value Cards
            name: values
            widget: list
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Body, name: body, widget: text }
          - { label: Credentials Intro, name: credentials_intro, widget: string }
          - label: Credentials
            name: credentials
            widget: list
            field: { label: Credential, name: credential, widget: string }
          - { label: Training Intro, name: training_intro, widget: string }
          - label: Training
            name: training
            widget: list
            field: { label: Training Item, name: training_item, widget: string }
